name: Build prox-report binaries

on:
  push:
  pull_request:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: prox-report

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Set binary name
        id: vars
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "BIN=prox-report.exe" >> $GITHUB_OUTPUT
          else
            echo "BIN=prox-report" >> $GITHUB_OUTPUT
          fi
          ls -al
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prox-report-${{ matrix.os }}
          path: prox-report/target/release/${{ steps.vars.outputs.BIN }}